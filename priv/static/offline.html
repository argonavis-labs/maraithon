<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <title>Maraithon Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f4f5;
        color: #18181b;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 360px);
        border: 1px solid rgba(24, 24, 27, 0.1);
        border-radius: 12px;
        background: white;
        padding: 24px;
        box-shadow: 0 1px 2px rgba(24, 24, 27, 0.04);
      }

      img {
        width: 48px;
        height: 48px;
        border-radius: 10px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 18px;
        line-height: 1.35;
      }

      p {
        margin: 0;
        color: #71717a;
        font-size: 14px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/images/app-icon.svg" alt="" />
      <h1>You are offline</h1>
      <p>Maraithon needs a connection for your current work, relationships, connected accounts, and proactive follow-through. Reconnect and refresh to continue.</p>
    </main>
  </body>
</html>
