name: Maraithon
options:
  bundleIdPrefix: com.maraithon
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "26.0"

# Per-developer signing. Config.xcconfig is a committed shim whose only
# job is to "#include?" Config.local.xcconfig (gitignored) so each dev /
# CI runner provides their own DEVELOPMENT_TEAM. See docs/SIGNING.md.
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    # Swift 6 language mode + Swift 6.2 "approachable concurrency"
    # surface. We do NOT set SWIFT_DEFAULT_ACTOR_ISOLATION = MainActor —
    # the iMessage source and its SQLite reader legitimately run
    # off-main, so module-wide main-actor default fights us more than it
    # helps. UI types still inherit main-actor via the SwiftUI App/View
    # protocols. See:
    # https://www.avanderlee.com/concurrency/approachable-concurrency-in-swift-6-2-a-clear-guide/
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_STRICT_CONCURRENCY: complete

    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

    ENABLE_HARDENED_RUNTIME: YES
    # Keep the Debug app as a normal signed executable. Xcode's debug
    # dylib mode moves app code into Maraithon.debug.dylib, which can
    # make macOS privacy grants behave like they are tied to a changing
    # debug artifact instead of the stable app bundle.
    ENABLE_DEBUG_DYLIB: NO
    # App Sandbox is OFF: chat.db access requires Full Disk Access, which
    # the sandbox blocks. Hardened Runtime + Developer ID notarization
    # are still in place.
    ENABLE_APP_SANDBOX: NO

    CODE_SIGN_STYLE: Automatic
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
  # CODE_SIGN_IDENTITY is driven by Config.local.xcconfig per-developer.
  # Falls back to ad-hoc ("-") at build time only when no local config
  # is present (the include in Config.xcconfig is optional).

packages:
  AsyncAlgorithms:
    url: https://github.com/apple/swift-async-algorithms
    from: 1.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.8.0

targets:
  Maraithon:
    type: application
    platform: macOS
    sources:
      - path: Sources/Maraithon
        excludes:
          - "Resources/.gitkeep"
    resources:
      - path: Sources/Maraithon/Resources
        optional: true
    dependencies:
      - package: AsyncAlgorithms
        product: AsyncAlgorithms
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: Maraithon
        PRODUCT_BUNDLE_IDENTIFIER: com.maraithon.companion
        CODE_SIGN_ENTITLEMENTS: Sources/Maraithon/Resources/Maraithon.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: Maraithon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        # Voice Memos v1.5: SFSpeechRecognizer requires this usage
        # description even when we hard-set `requiresOnDeviceRecognition`.
        # No audio leaves the device for transcription — the description
        # makes that promise to the user verbatim at the auth prompt.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Maraithon transcribes your Voice Memos locally on this Mac so you can search them by content. Audio never leaves your device for transcription."
        # EventKit full-access (read) for Reminders. macOS 14+ requires
        # an explicit "full access" prompt — there is no read-only tier
        # for Reminders any more. We never write back, even though the
        # entitlement allows it. The description below is what the user
        # sees in the OS auth prompt.
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "Maraithon mirrors your Mac reminders so the assistant can include them when you ask about your to-dos. Reminders stay in your account and are never shared."
        # EventKit full-access (read) for Calendar. macOS 14+ requires an
        # explicit "full access" prompt — there is no read-only tier any
        # more. We never write back. Description is what the user sees in
        # the OS prompt.
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Maraithon mirrors your Mac calendar so the assistant can answer scheduling questions and prep you for meetings. Calendar data stays in your account and is never shared."
        # Contacts read access for CRM person merging. We never write
        # back to Contacts.app; this only mirrors contact identity and
        # reachability fields into the user's Maraithon account.
        INFOPLIST_KEY_NSContactsUsageDescription: "Maraithon mirrors your Mac contacts so the assistant can merge people context and identify who messages, emails, and meetings involve. Contacts stay in your account and are never shared."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        # Sparkle EdDSA public key. Bundled into Info.plist so the app
        # can verify the signature on every downloaded update before
        # installing it. The matching private key never leaves the
        # release operator's Keychain.
        #
        # Real value generated by scripts/sparkle_keys.sh and pasted
        # via Config.local.xcconfig override (gitignored). The
        # placeholder below is harmless — any update payload signed
        # against it would never match a real signature, so an
        # un-overridden build simply rejects all updates.
        INFOPLIST_KEY_SUPublicEDKey: "PASTE_PUBLIC_KEY_VIA_CONFIG_LOCAL_XCCONFIG"
    info:
      path: Sources/Maraithon/Resources/Info.plist
      properties:
        CFBundleDisplayName: Maraithon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.productivity
        LSUIElement: false
        NSHumanReadableCopyright: ""
        # Voice Memos v1.5 on-device speech recognition. Mirrored from
        # INFOPLIST_KEY_NSSpeechRecognitionUsageDescription above so the
        # written Info.plist also has the key — xcodegen's `info` block
        # owns Info.plist, the INFOPLIST_KEY_* settings are for targets
        # that use GENERATE_INFOPLIST_FILE=YES.
        NSSpeechRecognitionUsageDescription: "Maraithon transcribes your Voice Memos locally on this Mac so you can search them by content. Audio never leaves your device for transcription."
        # EventKit Reminders read access (mirrored in INFOPLIST_KEY_*
        # above for target generation; mirrored here so the written
        # Info.plist contains the key as well).
        NSRemindersFullAccessUsageDescription: "Maraithon mirrors your Mac reminders so the assistant can include them when you ask about your to-dos. Reminders stay in your account and are never shared."
        # EventKit Calendar read access (mirrored from INFOPLIST_KEY_*
        # above so the written Info.plist contains the key as well).
        NSCalendarsFullAccessUsageDescription: "Maraithon mirrors your Mac calendar so the assistant can answer scheduling questions and prep you for meetings. Calendar data stays in your account and is never shared."
        # Contacts read access. Used to merge local Apple Contacts into
        # Maraithon's CRM people layer by email, phone, and Apple contact id.
        NSContactsUsageDescription: "Maraithon mirrors your Mac contacts so the assistant can merge people context and identify who messages, emails, and meetings involve. Contacts stay in your account and are never shared."
        # Deep link for the device-pair flow: maraithon://device-token/<t>
        CFBundleURLTypes:
          - CFBundleURLName: com.maraithon.companion.deeplink
            CFBundleURLSchemes:
              - maraithon
        # Cloud base URL — overridable per-build without touching code.
        MaraithonBaseURL: "https://maraithon.fly.dev"
        # Sparkle appcast feed. Served by the Maraithon Phoenix app once
        # the release pipeline lands.
        SUFeedURL: "https://maraithon.fly.dev/companion/appcast.xml"
        # Sparkle EdDSA public key. Mirrored from INFOPLIST_KEY_SUPublicEDKey
        # so the written Info.plist contains the key as well.
        # Real value generated by scripts/sparkle_keys.sh and pasted
        # via Config.local.xcconfig as `SUPublicEDKey = …` override.
        SUPublicEDKey: "$(SUPublicEDKey)"

  MaraithonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MaraithonTests
        excludes:
          - "Fixtures/.gitkeep"
    dependencies:
      - target: Maraithon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maraithon.companion.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Maraithon.app/Contents/MacOS/Maraithon"

schemes:
  Maraithon:
    build:
      targets:
        Maraithon: all
        MaraithonTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MaraithonTests
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
